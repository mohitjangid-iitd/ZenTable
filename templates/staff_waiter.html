<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Waiter — {{ data.restaurant.name }}</title>

    <!-- Google Fonts — Jinja2 render karega -->
    <link href="https://fonts.googleapis.com/css2?family={{ data.theme.font_primary.replace(' ', '+') }}:wght@400;600;700&family={{ data.theme.font_secondary.replace(' ', '+') }}:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Theme variables — Jinja2 se inject (static CSS mein nahi jayenge) -->
    <style>
        :root {
            --primary: {{ data.theme.primary_color }};
            --secondary: {{ data.theme.secondary_color }};
            --font-primary: '{{ data.theme.font_primary }}', serif;
            --font-secondary: '{{ data.theme.font_secondary }}', sans-serif;
            --radius: 14px;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
    </style>

    <!-- Static CSS -->
    <link rel="stylesheet" href="/static/css/staff_waiter.css?v={{ static_v('css/staff_waiter.css') }}">
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <img src="{{ data.restaurant.logo }}" alt="logo">
        <h1>{{ data.restaurant.name }}</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
        <span class="role-badge">WAITER</span>
        <a href="#" class="logout-btn" onclick="doLogout()">Logout</a>
    </div>
</div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('tables', this)">🪑 Tables</button>
    <button class="tab-btn" onclick="switchTab('orders', this)">📋 Orders</button>
    <button class="tab-btn" onclick="switchTab('place', this)">➕ Place Order</button>
</div>

<div class="body">

    <!-- TABLES TAB -->
    <div id="tab-tables">
        <div class="legend">
            <span><span class="legend-dot" style="background:#81c784"></span>Active</span>
            <span><span class="legend-dot" style="background:#ffb74d"></span>Pending</span>
            <span><span class="legend-dot" style="background:#4caf50"></span>Ready ✨</span>
            <span><span class="legend-dot" style="background:#90caf9"></span>Delivered</span>
            <span><span class="legend-dot" style="background:var(--primary)"></span>Billed</span>
            <span><span class="legend-dot" style="background:#bdbdbd"></span>Paid</span>
        </div>
        <div class="tables-grid" id="tables-grid">
            <div style="grid-column:span 3;text-align:center;padding:30px;color:#bbb">Loading...</div>
        </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders" style="display:none">
        <div class="toolbar">
            <h2>Orders</h2>
            <button class="refresh-sm" onclick="loadOrders()"><i class="fas fa-rotate"></i> Refresh</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
            <button class="filter-pill active" onclick="setFilter('active', this)">🔥 Active</button>
            <button class="filter-pill" onclick="setFilter('ready', this)">✅ Ready</button>
            <button class="filter-pill" onclick="setFilter('done', this)">📦 Delivered</button>
            <button class="filter-pill" onclick="setFilter('billed', this)">🧾 Billed</button>
            <button class="filter-pill" onclick="setFilter('paid', this)">💚 Paid Today</button>
        </div>
        <div id="orders-list">
            <div class="empty-state"><i class="fas fa-receipt"></i>Loading...</div>
        </div>
    </div>


    <!-- PLACE ORDER TAB -->
    <div id="tab-place" style="display:none">
        <div id="menu-items-list"></div>
    </div>
</div>

<!-- Floating Place Order Bar -->
<div id="wo-float-bar" style="display:none">
    <div class="wo-bar-left">
        <span class="wo-bar-count"></span>
        <span class="wo-bar-total"></span>
    </div>
    <button class="wo-bar-btn" onclick="placeOrder()">
        <i class="fas fa-paper-plane"></i> Place Order
    </button>
</div>

<!-- TABLE ACTION MODAL -->
<div id="modal">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title" id="modal-title">Table</div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<div id="toast"></div>

<!-- EDIT ORDER MODAL -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.45);">
    <div style="position:absolute;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;padding:20px;max-height:80vh;display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div style="font-family:var(--font-primary);font-size:1.1rem;color:var(--secondary);" id="edit-modal-title">Edit Order</div>
            <button onclick="closeEditModal()" style="background:#f5f5f5;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;">✕</button>
        </div>
        <div id="edit-modal-items" style="overflow-y:auto;flex:1;margin-bottom:16px;"></div>
        <div style="display:flex;gap:10px;">
            <button onclick="saveOrderEdit()" style="flex:1;padding:13px;background:var(--primary);color:var(--secondary);border:none;border-radius:12px;font-weight:700;font-size:0.95rem;cursor:pointer;">Save Changes</button>
            <button onclick="closeEditModal()" style="padding:13px 20px;background:#f5f5f5;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>
        </div>
        <button onclick="cancelOrderDirect()" style="width:100%;padding:11px;margin-top:8px;background:#fff0f0;color:#e53935;border:1.5px solid #ffcdd2;border-radius:12px;font-weight:700;font-size:0.88rem;cursor:pointer;">🚫 Cancel Entire Order</button>
    </div>
</div>

<!-- Jinja2 variables inject — static JS se PEHLE -->
<script>
    const clientId = "{{ client_id }}";
    const menuItems = {{ data['items'] | tojson }};
    const numTables = {{ data.restaurant.num_tables | default(6) }};
    let pendingBillId = null;
</script>

<style>
/* ── PLACE ORDER — new UI ── */
.wo-table-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 10px;
}
.wo-table-row label {
    font-family: var(--font-secondary);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--secondary);
    white-space: nowrap;
}
.wo-table-row input {
    width: 90px;
    padding: 8px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 1rem;
    font-family: var(--font-secondary);
    outline: none;
    color: var(--secondary);
}
.wo-table-row input:focus { border-color: var(--primary); }

.wo-search-wrap {
    position: relative;
    margin: 0 16px 10px;
}
.wo-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 0.85rem;
}
.wo-search-wrap input {
    width: 100%;
    padding: 10px 36px 10px 34px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    font-size: 0.9rem;
    font-family: var(--font-secondary);
    outline: none;
    box-sizing: border-box;
    background: #fafafa;
}
.wo-search-wrap input:focus { border-color: var(--primary); background: white; }
.wo-search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #aaa;
    font-size: 1rem;
    cursor: pointer;
    padding: 4px;
}

.wo-cat-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 10px;
    scrollbar-width: none;
}
.wo-cat-tabs::-webkit-scrollbar { display: none; }
.wo-cat-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #e0e0e0;
    background: white;
    font-size: 0.8rem;
    font-family: var(--font-secondary);
    font-weight: 500;
    color: #777;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
}
.wo-cat-tab.active {
    background: var(--secondary);
    border-color: var(--secondary);
    color: white;
    font-weight: 600;
}

#wo-items-wrap {
    padding: 0 12px;
}
.wo-item-card {
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.wo-item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}
.wo-item-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
}
.wo-item-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}
.wo-item-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}
.wo-veg-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1.5px solid;
    position: relative;
}
.wo-veg-dot::after {
    content: '';
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
.wo-veg-dot.veg { border-color: #4caf50; }
.wo-veg-dot.veg::after { background: #4caf50; }
.wo-veg-dot.nonveg { border-color: #e53935; }
.wo-veg-dot.nonveg::after { background: #e53935; }

.wo-item-name {
    font-family: var(--font-secondary);
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.wo-item-price {
    font-size: 0.82rem;
    font-weight: 600;
    color: #888;
    white-space: nowrap;
}

/* Sized item rows */
.wo-sizes-list { display: flex; flex-direction: column; gap: 6px; }
.wo-size-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-top: 1px solid #f5f5f5;
}
.wo-size-info { display: flex; flex-direction: column; gap: 1px; }
.wo-size-lbl { font-size: 0.8rem; color: #555; font-family: var(--font-secondary); }
.wo-size-price { font-size: 0.78rem; color: #999; font-weight: 600; }

/* Qty controls */
.wo-qty-ctrl { display: flex; align-items: center; gap: 8px; }
.wo-add-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: var(--secondary);
    font-size: 1.2rem;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
}
.wo-minus, .wo-plus {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.wo-minus {
    border: 1.5px solid var(--primary);
    background: transparent;
    color: var(--primary);
}
.wo-plus {
    border: none;
    background: var(--primary);
    color: var(--secondary);
}

.wo-empty {
    text-align: center;
    padding: 30px;
    color: #bbb;
    font-size: 0.9rem;
    font-family: var(--font-secondary);
}

/* Floating bar */
#wo-float-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--secondary);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 300;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
}
.wo-bar-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.wo-bar-count {
    font-size: 0.78rem;
    opacity: 0.75;
    font-family: var(--font-secondary);
}
.wo-bar-total {
    font-size: 1.1rem;
    font-weight: 700;
    font-family: var(--font-primary);
}
.wo-bar-btn {
    background: var(--primary);
    color: var(--secondary);
    border: none;
    border-radius: 12px;
    padding: 11px 22px;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: var(--font-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
}
        .edit-order-btn {
            padding: 5px 10px;
            border-radius: 8px;
            border: 1.5px solid #e0e0e0;
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
            color: #666;
        }
        .edit-order-btn:hover { background: #f5f5f5; }
</style>

<!-- Static JS file -->
<script src="/static/js/staff_waiter.js?v={{ static_v('js/staff_waiter.js') }}"></script>
<script>
async function doLogout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
}
</script>

</body>
</html>
