<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Waiter — {{ data.restaurant.name }}</title>

    <!-- Google Fonts — Jinja2 render karega -->
    <link href="https://fonts.googleapis.com/css2?family={{ data.theme.font_primary.replace(' ', '+') }}:wght@400;600;700&family={{ data.theme.font_secondary.replace(' ', '+') }}:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Theme variables — Jinja2 se inject (static CSS mein nahi jayenge) -->
    <style>
        :root {
            --primary: {{ data.theme.primary_color }};
            --secondary: {{ data.theme.secondary_color }};
            --font-primary: '{{ data.theme.font_primary }}', serif;
            --font-secondary: '{{ data.theme.font_secondary }}', sans-serif;
            --radius: 14px;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
    </style>

    <!-- Static CSS -->
    <link rel="stylesheet" href="/static/css/staff_waiter.css?v={{ static_v('css/staff_waiter.css') }}">
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <img src="{{ data.restaurant.logo }}" alt="logo">
        <h1>{{ data.restaurant.name }}</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
        <span class="role-badge">WAITER</span>
        <a href="/{{ client_id }}/staff" class="logout-btn">Logout</a>
    </div>
</div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('tables', this)">🪑 Tables</button>
    <button class="tab-btn" onclick="switchTab('orders', this)">📋 Orders</button>
    <button class="tab-btn" onclick="switchTab('place', this)">➕ Place Order</button>
</div>

<div class="body">

    <!-- TABLES TAB -->
    <div id="tab-tables">
        <div class="legend">
            <span><span class="legend-dot" style="background:#81c784"></span>Active</span>
            <span><span class="legend-dot" style="background:#ffb74d"></span>Pending</span>
            <span><span class="legend-dot" style="background:#4caf50"></span>Ready ✨</span>
            <span><span class="legend-dot" style="background:#90caf9"></span>Delivered</span>
            <span><span class="legend-dot" style="background:var(--primary)"></span>Billed</span>
            <span><span class="legend-dot" style="background:#bdbdbd"></span>Paid</span>
        </div>
        <div class="tables-grid" id="tables-grid">
            <div style="grid-column:span 3;text-align:center;padding:30px;color:#bbb">Loading...</div>
        </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders" style="display:none">
        <div class="toolbar">
            <h2>Orders</h2>
            <button class="refresh-sm" onclick="loadOrders()"><i class="fas fa-rotate"></i> Refresh</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
            <button class="filter-pill active" onclick="setFilter('active', this)">🔥 Active</button>
            <button class="filter-pill" onclick="setFilter('ready', this)">✅ Ready</button>
            <button class="filter-pill" onclick="setFilter('done', this)">📦 Delivered</button>
            <button class="filter-pill" onclick="setFilter('billed', this)">🧾 Billed</button>
            <button class="filter-pill" onclick="setFilter('paid', this)">💚 Paid Today</button>
        </div>
        <div id="orders-list">
            <div class="empty-state"><i class="fas fa-receipt"></i>Loading...</div>
        </div>
    </div>

    <!-- PLACE ORDER TAB -->
    <div id="tab-place" style="display:none">
        <div class="section-card">
            <div class="section-head">Place Order</div>
            <div class="section-body">
                <div class="form-group">
                    <label>Table Number</label>
                    <input type="number" id="wo-table" placeholder="e.g. 2" min="1">
                </div>
                <div id="menu-items-list"></div>
                <button class="submit-btn" onclick="placeOrder()">
                    <i class="fas fa-paper-plane"></i> Place Order
                </button>
            </div>
        </div>
    </div>
</div>

<!-- TABLE ACTION MODAL -->
<div id="modal">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title" id="modal-title">Table</div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<div id="toast"></div>

<!-- Jinja2 variables inject — static JS se PEHLE -->
<script>
    const clientId = "{{ client_id }}";
    const menuItems = {{ data['items'] | tojson }};
    const numTables = {{ data.restaurant.num_tables | default(6) }};
    let pendingBillId = null;
    const waiterQtys = {};
</script>

<!-- Static JS file -->
<script src="/static/js/staff_waiter.js?v={{ static_v('js/staff_waiter.js') }}"></script>

</body>
</html>
