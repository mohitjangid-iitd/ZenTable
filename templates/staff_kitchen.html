<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/assets/zentable/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/zentable/favicon_32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/zentable/favicon_16.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Kitchen — {{ data.restaurant.name }}</title>

    <!-- Google Fonts — Jinja2 render karega -->
    <link href="https://fonts.googleapis.com/css2?family={{ data.theme.font_secondary.replace(' ', '+') }}:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Theme variables — Jinja2 se inject -->
    <style>
        :root {
            --primary: {{ data.theme.primary_color }};
            --secondary: {{ data.theme.secondary_color }};
            --font-primary: '{{ data.theme.font_primary }}', serif;
            --font-secondary: '{{ data.theme.font_secondary }}', sans-serif;
            --radius: 14px;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
    </style>

    <!-- Static CSS -->
    <link rel="stylesheet" href="/static/css/staff_kitchen.css?v={{ static_v('css/staff_kitchen.css') }}">
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <img src="{{ data.restaurant.logo }}" alt="logo">
        <h1>{{ data.restaurant.name }}</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
        <span class="role-badge">KITCHEN</span>
        <a href="#" class="logout-btn" onclick="doLogout()">Logout</a>
    </div>
</div>

<div class="body">
    <div class="toolbar">
        <h2>🔥 Live Orders</h2>
        <button class="refresh-btn" onclick="load()"><i class="fas fa-rotate"></i> Refresh</button>
    </div>
    <div id="orders-list">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
    </div>
</div>

<div id="toast"></div>

<!-- Jinja2 variables inject — static JS se PEHLE -->
<script>
    const clientId = "{{ client_id }}";
    const restaurantLogo = "{{ data.restaurant.logo }}";
</script>

<!-- Static JS -->
<script src="/static/js/staff_kitchen.js?v={{ static_v('js/staff_kitchen.js') }}"></script>
<script>
async function doLogout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.replace('/login');
}
</script>

</body>
</html>
