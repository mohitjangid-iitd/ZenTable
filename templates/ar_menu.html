<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>AR Menu</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }

/* Top Controls */
#top-controls{
    position:fixed;
    top:15px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:1000;
}

.control-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.3);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
}

/* Bottom Carousel */
#ui-layer{
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:1000;
}

#carousel-wrapper{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:10px;
    max-width:95%;
}

.dish-btn{
    min-width:100px;
    padding:10px;
    background:rgba(255,255,255,0.15);
    border-radius:15px;
    color:white;
    text-align:center;
    cursor:pointer;
}

.active{
    background:white !important;
    color:black !important;
}
</style>
</head>

<body>

<div id="top-controls">
    <a href="/{{ client_id }}" class="control-btn">🏠</a>
    <div style="display:flex; gap:10px;">
        <div class="control-btn" id="screenshot-btn">📷</div>
        <div class="control-btn" id="share-btn">🔗</div>
    </div>
</div>

<div id="ui-layer">
    <div id="carousel-wrapper"></div>
</div>

<a-scene
    mindar-image="imageTargetSrc: /static/assets/{{ client_id }}/targets.mind; autoStart: true; uiLoading: no;"
    color-space="sRGB"
    renderer="colorManagement:true, physicallyCorrectLights:true"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="ar-model"></a-gltf-model>
    </a-entity>

    <a-entity light="type:ambient; intensity:1.2"></a-entity>
    <a-entity light="type:directional; intensity:0.8" position="1 2 1"></a-entity>

</a-scene>

<script>
const clientId = "{{ client_id }}";
const modelEl = document.querySelector("#ar-model");
const sceneEl = document.querySelector("a-scene");

let currentRotation = {x:0, y:0, z:0};
let isAutoRotating = false;
let currentScale = 1;

// ======================
// LOAD MENU
// ======================
async function loadMenu(){
    const res = await fetch(`/api/menu/${clientId}`);
    const data = await res.json();
    const carousel = document.getElementById("carousel-wrapper");

    data.items.forEach((item,index)=>{
        const btn = document.createElement("div");
        btn.className="dish-btn";
        btn.innerHTML=`${item.name}<br>${item.price}`;

        btn.onclick=()=>{
            modelEl.setAttribute("gltf-model", `/static/assets/${item.model}`);
            modelEl.setAttribute("position", item.position || "0 0 0");
            modelEl.setAttribute("scale", item.scale || "1 1 1");

            currentRotation = {x:0,y:0,z:0};
            currentScale = parseFloat((item.scale || "1 1 1").split(" ")[0]);

            if(item.auto_rotate===true){
                isAutoRotating=true;
                modelEl.setAttribute("animation",{
                    property:"rotation",
                    to:`0 360 0`,
                    dur:item.rotate_speed || 10000,
                    easing:"linear",
                    loop:true
                });
            }else{
                isAutoRotating=false;
                modelEl.removeAttribute("animation");
            }

            document.querySelectorAll(".dish-btn")
                .forEach((b,i)=>b.classList.toggle("active",i===index));
        };

        carousel.appendChild(btn);
        if(index===0) btn.click();
    });
}
loadMenu();

// ======================
// RESTRICTED TOUCH ROTATION (Y-AXIS ONLY)
// ======================

let isDragging = false;
let previousTouchX = 0;

function stopAutoRotate(){
    if(isAutoRotating){
        modelEl.removeAttribute("animation");
        isAutoRotating = false;
    }
}

sceneEl.addEventListener("touchstart", (e) => {
    stopAutoRotate();

    if(e.touches.length === 1){
        isDragging = true;
        previousTouchX = e.touches[0].clientX;
    }
});

sceneEl.addEventListener("touchmove", (e) => {
    if(!modelEl.getAttribute("gltf-model")) return;

    if(e.touches.length === 1 && isDragging){
        const currentX = e.touches[0].clientX;
        const deltaX = currentX - previousTouchX;

        // Only Y-axis rotation (left-right)
        currentRotation.y += deltaX * 0.5;

        modelEl.setAttribute(
            "rotation",
            `0 ${currentRotation.y} 0`
        );

        previousTouchX = currentX;
    }
});

sceneEl.addEventListener("touchend", () => {
    isDragging = false;
});


// ======================
// SCREENSHOT
// ======================
document.getElementById("screenshot-btn").onclick=()=>{
    const canvas=sceneEl.components.screenshot.getCanvas("perspective");
    const link=document.createElement("a");
    link.download="AR.png";
    link.href=canvas.toDataURL();
    link.click();
};

// ======================
// SHARE
// ======================
document.getElementById("share-btn").onclick=async()=>{
    if(navigator.share){
        await navigator.share({
            title:"AR Menu",
            text:"Check this AR Menu!",
            url:window.location.href
        });
    }else{
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied!");
    }
};
</script>

</body>
</html>
