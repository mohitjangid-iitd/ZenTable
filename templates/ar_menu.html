<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/assets/zentable/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/zentable/favicon_32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/zentable/favicon_16.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AR Menu</title>

    <!-- A-Frame & MindAR — head mein hone chahiye (scene render se pehle) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>

    <!-- Static CSS -->
    <link rel="stylesheet" href="/static/css/ar_menu.css?v={{ static_v('css/ar_menu.css') }}">
</head>
<body>

<div id="top-controls">
    <a href="/{{ client_id }}{% if table_no %}/table/{{ table_no }}{% endif %}" class="control-btn">🏠</a>
    <div style="display:flex; gap:10px;">
        <a href="/{{ client_id }}{% if table_no %}/table/{{ table_no }}{% endif %}/menu" class="control-btn" id="menu-btn">📋</a>
        <div class="control-btn" id="screenshot-btn">📷</div>
        <div class="control-btn" id="share-btn">🔗</div>
    </div>
</div>

<div style="position:fixed;bottom:10px;left:0;right:0;text-align:center;font-size:0.65rem;color:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;gap:4px;z-index:100;pointer-events:none;">
    <img src="/static/assets/zentable/logo_white_192.png" style="width:10px;height:10px;object-fit:contain;opacity:0.4;" />
    <span>Powered by {{ site.name }}</span>
</div>

<div id="ui-layer">
    <div id="carousel-wrapper"></div>
</div>

<a-scene style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;" mindar-image="imageTargetSrc: /static/assets/{{ client_id }}/targets.mind; autoStart: true; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB" renderer="colorManagement:true, physicallyCorrectLights:true" vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="ar-model"></a-gltf-model>
    </a-entity>

    <a-entity light="type:ambient; intensity:1.2"></a-entity>
    <a-entity light="type:directional; intensity:0.8" position="1 2 1"></a-entity>

</a-scene>

<!-- Jinja2 variable inject — static JS se PEHLE -->
<script>
    const clientId = "{{ client_id }}";
    const tableNo = {{ table_no if table_no else 'null' }};  <!-- 👈 ye line add karo -->
</script>

<!-- Static JS -->
<script src="/static/js/ar_menu.js?v={{ static_v('js/ar_menu.js') }}"></script>

</body>
</html>
