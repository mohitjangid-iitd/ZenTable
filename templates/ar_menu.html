<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/assets/zentable/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/zentable/favicon_32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/zentable/favicon_16.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AR Menu</title>

    <!-- A-Frame & MindAR — head mein hone chahiye (scene render se pehle) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="/static/js/mindar-image-aframe.prod.js?v={{ static_v('js/mindar-image-aframe.prod.js') }}"></script>
    
    <!-- Static CSS -->
    <link rel="stylesheet" href="/static/css/ar_menu.css?v={{ static_v('css/ar_menu.css') }}">
</head>
<body>


<div id="top-controls">
    <!-- Left: Home -->
    <a href="/{{ client_id }}{% if table_no %}/table/{{ table_no }}{% endif %}" class="control-btn-wrap">
        <div class="control-btn">
            <svg viewBox="0 0 24 24">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" fill="url(#btnGrad)" fill-opacity="0.12"/>
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
                <path d="M9 21V12h6v9"/>
            </svg>
        </div>
        <span class="btn-label">Home</span>
    </a>

    <!-- Right: Menu, Screenshot, Share -->
    <div style="display:flex; gap:14px; align-items:flex-start;">
        <a href="/{{ client_id }}{% if table_no %}/table/{{ table_no }}{% endif %}/menu" class="control-btn-wrap" id="menu-btn">
            <div class="control-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="1"/>
                    <line x1="9" y1="12" x2="15" y2="12"/>
                    <line x1="9" y1="16" x2="13" y2="16"/>
                </svg>
            </div>
            <span class="btn-label">Menu</span>
        </a>
        <div class="control-btn-wrap" id="screenshot-btn">
            <div class="control-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </div>
            <span class="btn-label">Shot</span>
        </div>
        <div class="control-btn-wrap" id="share-btn">
            <div class="control-btn">
                <svg viewBox="0 0 24 24">
                    <circle cx="18" cy="5" r="3"/>
                    <circle cx="6" cy="12" r="3"/>
                    <circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
            </div>
            <span class="btn-label">Share</span>
        </div>
    </div>
</div>

<div style="position:fixed;bottom:10px;left:0;right:0;text-align:center;font-size:0.65rem;color:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;gap:4px;z-index:100;pointer-events:none;">
    <img src="/static/assets/zentable/logo_white_192.png" style="width:10px;height:10px;object-fit:contain;opacity:0.4;" />
    <span>Powered by {{ site.name }}</span>
</div>

<div id="ui-layer">
    <div id="carousel-wrapper"></div>
</div>

<!-- AR Loader -->
<div id="ar-loader">
    <canvas id="loader-canvas" width="220" height="180"></canvas>
    <div id="loader-text">Zen<span>Table</span></div>
    <div id="loader-sub">LOADING EXPERIENCE</div>
</div>

<a-scene style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;"
    mindar-image="imageTargetSrc: {{ mind_url }}; autoStart: true; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB" renderer="colorManagement:true, physicallyCorrectLights:true" vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="ar-model"></a-gltf-model>
    </a-entity>

    <a-entity light="type:ambient; intensity:1.2"></a-entity>
    <a-entity light="type:directional; intensity:0.8" position="1 2 1"></a-entity>

</a-scene>

<!-- Jinja2 variable inject — static JS se PEHLE -->
<script>
    const clientId = "{{ client_id }}";
    const tableNo = {{ table_no if table_no else 'null' }};
</script>

<!-- Static JS -->
<script src="/static/js/ar_menu.js?v={{ static_v('js/ar_menu.js') }}"></script>

</body>
</html>
