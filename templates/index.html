<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AR Menu - Premium Experience</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; background: #000; }
        
        #ui-layer {
            position: fixed; bottom: 30px; left: 0; width: 100%; 
            z-index: 1000; display: flex; justify-content: center;
        }

        #carousel-wrapper {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px; 
            max-width: 95%; scroll-behavior: smooth; scrollbar-width: none;
        }
        #carousel-wrapper::-webkit-scrollbar { display: none; }

        .dish-btn {
            min-width: 100px; padding: 10px 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 18px; color: white; text-align: center;
            cursor: pointer; transition: all 0.3s ease; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .dish-name { display: block; font-size: 13px; font-weight: 600; }
        .dish-price { display: block; font-size: 10px; opacity: 0.8; }

        .active { 
            background: #ffffff !important; color: #000 !important; 
            transform: translateY(-5px); border-color: #ffffff;
            box-shadow: 0 8px 15px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="carousel-wrapper"></div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: /static/assets/{{ client_id }}/targets.mind; autoStart: true; uiLoading: no; filterMinCF:0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
            <a-gltf-model id="ar-model"></a-gltf-model>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1.2"></a-entity>
        <a-entity light="type: directional; intensity: 0.8" position="1 2 1"></a-entity>
    </a-scene>

    <script>
        const clientId = "{{ client_id }}";

        async function loadMenu() {
            try {
                const res = await fetch(`/api/menu/${clientId}`);
                const data = await res.json();
                const carousel = document.getElementById('carousel-wrapper');
                const modelEl = document.querySelector('#ar-model');

                data.items.forEach((item, index) => {
                    const btn = document.createElement('div');
                    btn.className = 'dish-btn';
                    // InnerHTML use kar rahe hain taaki Rupee code render ho sake
                    btn.innerHTML = `<span class="dish-name">${item.name}</span><span class="dish-price">${item.price}</span>`;
                    
                    btn.onclick = () => {
                        // 1. Load Model
                        modelEl.setAttribute('gltf-model', `/static/assets/${item.model}`); 
                        
                        // 2. Set Basic Transforms
                        modelEl.setAttribute('position', item.position || "0 0 0");
                        modelEl.setAttribute('scale', item.scale || "1 1 1");
                        
                        // 3. Auto-Rotate Logic from JSON
                        if(item.auto_rotate === true) {
                            const currentRot = item.rotation || "0 0 0";
                            const yRotation = parseInt(currentRot.split(' ')[1] || 0);
                            
                            modelEl.setAttribute('animation', {
                                property: 'rotation',
                                from: currentRot,
                                to: `0 ${yRotation + 360} 0`,
                                dur: item.rotate_speed || 10000,
                                easing: 'linear',
                                loop: true
                            });
                        } else {
                            modelEl.removeAttribute('animation');
                            modelEl.setAttribute('rotation', item.rotation || "0 0 0");
                        }
                        
                        // 4. UI Active State
                        document.querySelectorAll('.dish-btn').forEach((b, i) => {
                            b.classList.toggle('active', i === index);
                        });
                        btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                    };
                    
                    carousel.appendChild(btn);
                    if(index === 0) btn.click(); 
                });

                if (data.items.length < 4) carousel.style.justifyContent = 'center';

            } catch (error) {
                console.error("Error loading menu:", error);
            }
        }
        loadMenu();
    </script>
</body>
</html>
