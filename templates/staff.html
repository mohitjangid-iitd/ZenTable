<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>{{ data.restaurant.name }} — Staff Login</title>
    <link href="https://fonts.googleapis.com/css2?family={{ data.theme.font_primary.replace(' ', '+') }}:wght@400;600;700&family={{ data.theme.font_secondary.replace(' ', '+') }}:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: {{ data.theme.primary_color }};
            --secondary: {{ data.theme.secondary_color }};
            --font-primary: '{{ data.theme.font_primary }}', serif;
            --font-secondary: '{{ data.theme.font_secondary }}', sans-serif;
            --radius: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:var(--font-secondary); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; background:var(--secondary); }

        .login-logo { width:70px; height:70px; border-radius:50%; object-fit:cover; border:3px solid var(--primary); margin-bottom:12px; }
        .login-title { font-family:var(--font-primary); color:white; font-size:1.5rem; margin-bottom:4px; }
        .login-sub { color:rgba(255,255,255,0.5); font-size:0.8rem; margin-bottom:32px; letter-spacing:1px; text-transform:uppercase; }

        .role-cards { display:flex; flex-direction:column; gap:12px; width:100%; max-width:340px; margin-bottom:24px; }
        .role-card { background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.12); border-radius:var(--radius); padding:16px 20px; display:flex; align-items:center; gap:16px; cursor:pointer; transition:all 0.2s; color:white; }
        .role-card.selected { background:rgba(255,255,255,0.13); border-color:var(--primary); }
        .role-icon { width:42px; height:42px; border-radius:10px; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:var(--secondary); flex-shrink:0; }
        .role-info h3 { font-size:0.95rem; font-weight:600; }
        .role-info p  { font-size:0.75rem; opacity:0.5; margin-top:2px; }

        .pin-section { width:100%; max-width:340px; display:none; }
        .pin-section.show { display:block; }
        .pin-label { color:rgba(255,255,255,0.6); font-size:0.8rem; margin-bottom:8px; text-align:center; }
        .pin-input-wrap { display:flex; gap:8px; justify-content:center; margin-bottom:16px; }
        .pin-digit { width:52px; height:56px; border-radius:10px; border:1.5px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:white; font-size:1.5rem; text-align:center; outline:none; font-family:var(--font-secondary); }
        .pin-digit:focus { border-color:var(--primary); }
        .login-btn { width:100%; padding:14px; background:var(--primary); color:var(--secondary); border:none; border-radius:var(--radius); font-size:1rem; font-weight:700; cursor:pointer; font-family:var(--font-secondary); }
        .pin-error { color:#ff6b6b; font-size:0.8rem; text-align:center; margin-top:10px; display:none; }
    </style>
</head>
<body>
    <img src="{{ data.restaurant.logo }}" class="login-logo" alt="logo">
    <div class="login-title">{{ data.restaurant.name }}</div>
    <div class="login-sub">Staff Portal</div>

    <div class="role-cards">
        <div class="role-card" onclick="selectRole('owner', this)">
            <div class="role-icon">👑</div>
            <div class="role-info"><h3>Owner</h3><p>Analytics, orders, tables</p></div>
        </div>
        <div class="role-card" onclick="selectRole('kitchen', this)">
            <div class="role-icon">🔥</div>
            <div class="role-info"><h3>Kitchen</h3><p>Live orders, status update</p></div>
        </div>
        <div class="role-card" onclick="selectRole('waiter', this)">
            <div class="role-icon">🛎️</div>
            <div class="role-info"><h3>Waiter</h3><p>Tables, orders, billing</p></div>
        </div>
    </div>

    <div class="pin-section" id="pin-section">
        <div class="pin-label">Enter PIN</div>
        <div class="pin-input-wrap">
            <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" id="p0">
            <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" id="p1">
            <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" id="p2">
            <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" id="p3">
        </div>
        <button class="login-btn" onclick="verifyPin()">Login</button>
        <div class="pin-error" id="pin-error">Incorrect PIN. Try again.</div>
    </div>

<script>
    const PINS = {
        owner:   "{{ data.staff.owner_pin }}",
        kitchen: "{{ data.staff.kitchen_pin }}",
        waiter:  "{{ data.staff.waiter_pin }}"
    };
    const clientId = "{{ client_id }}";
    let currentRole = null;

    function selectRole(role, el) {
        currentRole = role;
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('pin-section').classList.add('show');
        document.getElementById('pin-error').style.display = 'none';
        clearPin();
        document.getElementById('p0').focus();
    }

    function clearPin() {
        ['p0','p1','p2','p3'].forEach(id => document.getElementById(id).value = '');
    }

    ['p0','p1','p2','p3'].forEach((id, i) => {
        document.getElementById(id).addEventListener('input', e => {
            if (e.target.value && i < 3) document.getElementById(`p${i+1}`).focus();
            if (i === 3 && e.target.value) verifyPin();
        });
        document.getElementById(id).addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !e.target.value && i > 0)
                document.getElementById(`p${i-1}`).focus();
        });
    });

    function verifyPin() {
        const entered = ['p0','p1','p2','p3'].map(id => document.getElementById(id).value).join('');
        if (entered === PINS[currentRole]) {
            window.location.href = `/${clientId}/staff/${currentRole}`;
        } else {
            document.getElementById('pin-error').style.display = 'block';
            clearPin();
            document.getElementById('p0').focus();
        }
    }
</script>
</body>
</html>
